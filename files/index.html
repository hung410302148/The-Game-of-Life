<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命之旅：電子銀行</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 加入頁 -->
    <div id="join-page" class="page">
        <div class="card">
            <h1>🎮 生命之旅</h1>
            <p>電子銀行系統</p>
            <input type="text" id="playerName"
                style="width: 80%; padding: 10px; margin-bottom: 10px;"
                placeholder="請輸入玩家名稱">
            <button id="joinBtn" class="primary-btn">開始人生</button>
        </div>
    </div>

    <!-- 遊戲頁 -->
    <div id="game-page" class="page">

        <header>
            <div id="turn-indicator">等待操作...</div>
            <div id="welcome-msg">玩家：<span>-</span></div>
        </header>

        <main class="dashboard">

            <!-- 數值統計區 -->
            <section class="dashboard-stats">
                <div class="stats-row-main">
                    <div class="stat-box money" id="display-balance-box">
                        <label>現金 (Cash)</label>
                        <div id="display-balance">$0</div>
                    </div>
                    <div class="stat-box life" id="display-life-box">
                        <label>人生值 (Life)</label>
                        <div id="display-life">0</div>
                    </div>
                </div>

                <div class="stats-row-sub">
                    <div class="stat-box" id="box-years">
                        <label>年數</label>
                        <div id="display-years">30</div>
                    </div>
                    <div class="stat-box" id="box-salary">
                        <label>薪資</label>
                        <div id="display-salary">0</div>
                    </div>
                    <div class="stat-box" id="box-marriage">
                        <label>婚姻</label>
                        <div id="status-marriage">無</div>
                    </div>
                    <div class="stat-box" id="box-child">
                        <label>子女</label>
                        <div id="status-child">0</div>
                    </div>
                    <div class="stat-box" id="box-house">
                        <label>房產</label>
                        <div id="status-house">無</div>
                    </div>
                    <div class="stat-box" id="box-car">
                        <label>車輛</label>
                        <div id="status-car">無</div>
                    </div>
                    <div class="stat-box" id="box-edu">
                        <label>學歷</label>
                        <div id="status-edu">高中</div>
                    </div>
                </div>
            </section>

            <!-- 操作控制區 -->
            <section class="controls">
                <div id="function-grid" class="function-grid">
                    <button class="func-btn" data-val="1">1<br>Salary</button>
                    <button class="func-btn" data-val="2">2<br>Lottery</button>
                    <button class="func-btn" data-val="3">3<br>Marriage</button>
                    <button class="func-btn" data-val="4">4<br>Child</button>
                    <button class="func-btn" data-val="5">5<br>House</button>
                    <button class="func-btn" data-val="6">6<br>Car</button>
                    <button class="func-btn" data-val="7">7<br>Tax</button>
                    <button class="func-btn" data-val="8">8<br>Event</button>
                    <button class="func-btn" data-val="9">9<br>Stock</button>
                    <button class="func-btn" data-val="10">10<br>Life</button>
                </div>

                <div class="operation-row">
                    <button id="resetBtn" class="side-btn hidden">Reset</button>
                    <button id="minusBtn" class="op-btn">-</button>
                    <div class="spin-box">
                        <div id="spin-result"></div>
                        <button id="spinBtn">SPIN</button>
                    </div>
                    <button id="plusBtn" class="op-btn">+</button>
                    <button id="enterBtn" class="side-btn hidden">Enter</button>
                </div>

                <button id="endTurnBtn" class="primary-btn">✅ 結束回合</button>
            </section>

            <!-- 全場玩家狀態 -->
            <section id="player-status-area">
                <h4 style="margin: 0 0 10px 0; font-size: 16px; color: #f7f7f7;">全場玩家狀態</h4>
                <div id="other-players-list"></div>
            </section>

            <!-- 底部 -->
            <section class="bottom-controls">
                <button id="leaveBtn" class="primary-btn" style="background: #94a3b8; margin-top: 10px;">
                    退出遊戲
                </button>
            </section>

        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
